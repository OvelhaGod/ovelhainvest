services:
  ovelhainvest-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ovelhainvest-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.ovelhainvest.service=backend-api"
