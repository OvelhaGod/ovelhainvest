name: Keep Services Alive
on:
  schedule:
    - cron: '0 8 * * 1,4'  # Every Monday and Thursday at 8AM UTC
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  ping-supabase:
    name: Supabase Heartbeat
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Pinging Supabase at $(date -u)"

          # Ping 1: REST API health check — any response (even 404) keeps project alive
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/assets?limit=1")

          echo "REST API status: $STATUS"

          # Ping 2: Write heartbeat row (works once migrations are applied)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          WRITE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            "$SUPABASE_URL/rest/v1/keep_alive_log" \
            -d "{\"pinged_at\": \"$TIMESTAMP\", \"source\": \"github-actions\"}")

          echo "Heartbeat write status: $WRITE_STATUS (200/201 = ok, 404 = migrations not yet applied)"

          # Ping 3: Cleanup old logs (only if table exists)
          if [ "$WRITE_STATUS" = "201" ]; then
            CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                     python3 -c "from datetime import datetime, timedelta; print((datetime.utcnow()-timedelta(days=30)).strftime('%Y-%m-%dT%H:%M:%SZ'))")
            curl -s -o /dev/null -X DELETE \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              "$SUPABASE_URL/rest/v1/keep_alive_log?pinged_at=lt.$CUTOFF"
            echo "Old heartbeat logs cleaned"
          fi

          # Fail only if Supabase project is completely unreachable (not 404 from missing table)
          if [ "$STATUS" = "000" ]; then
            echo "ALERT: Supabase is completely unreachable — project may be paused!"
            exit 1
          fi

          echo "Supabase is alive (status $STATUS)"

  ping-ovelhainvest-api:
    name: OvelhaInvest API Heartbeat
    runs-on: ubuntu-latest
    steps:
      - name: Ping OvelhaInvest API
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL not set — skipping API ping"
            exit 0
          fi

          echo "Pinging OvelhaInvest API at $APP_BASE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "$APP_BASE_URL/health" || echo "000")

          echo "API health status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "OvelhaInvest API is alive"
          else
            echo "API returned $STATUS — homelab may be offline (non-fatal)"
          fi

  notify-on-failure:
    name: Telegram Alert on Failure
    runs-on: ubuntu-latest
    needs: [ping-supabase]
    if: failure()
    steps:
      - name: Send Telegram Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured — skipping alert"
            exit 0
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚨 OvelhaInvest Keep-Alive FAILED%0A%0ASupabase may be paused or unreachable.%0ACheck: https://supabase.com/dashboard%0A%0ATime: $(date -u)" \
            -d "parse_mode=Markdown"
